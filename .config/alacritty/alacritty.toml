import = [
    "~/.config/alacritty/dracula.toml"
]

[env]
TERM = "xterm-256color"

[window]
opacity = 0.8
blur = true

[font]
size = 16

[font.normal]
family = "FiraCode Nerd Font Mono"

[keyboard]
bindings = [
    { key = "Right", mods = "Alt", chars = "\u001BF" },
    { key = "Left", mods = "Alt", chars = "\u001BB" }
]
